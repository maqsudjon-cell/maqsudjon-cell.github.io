name: Regenerate sitemap
on:
  schedule:
    - cron: '30 3 * * *'   # daily 03:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sitemap.xml from the hub's tests.json + news posts.json
        run: |
          python3 - <<'EOF'
          import json, urllib.request, datetime

          req = urllib.request.Request(
              'https://flarestamina.com/ielts-hub/tests.json',
              headers={'User-Agent': 'Flarestamina-sitemap'})
          tests = json.loads(urllib.request.urlopen(req, timeout=30).read())['tests']

          # news posts live in the repo itself
          posts = json.load(open('news/posts.json'))['posts']

          # community pages generated by .github/scripts/build_community.py
          try:
              ci = json.load(open('news/articles-index.json'))
              arts = ci.get('articles', {})
              authors = ci.get('authors', [])
          except Exception:
              arts, authors = {}, []

          # stable lastmod (newest test date) so the file only changes when tests change
          today = max([t.get('date') or '' for t in tests] + ['2026-07-03'])
          news_mod = max([p['date'] for p in posts] + ['2026-07-15'])
          urls = [
              ('https://flarestamina.com/', today, 'weekly', '1.0'),
              ('https://flarestamina.com/ielts-hub/', today, 'daily', '0.9'),
              ('https://flarestamina.com/news/', news_mod, 'daily', '0.9'),
              ('https://flarestamina.com/founder/', '2026-07-15', 'monthly', '0.6'),
              ('https://flarestamina.com/writearticle/', '2026-07-15', 'monthly', '0.6'),
              ('https://flarestamina.com/convert/', '2026-07-16', 'monthly', '0.8'),
              ('https://flarestamina.com/deadlines/', '2026-07-17', 'weekly', '0.8'),
              ('https://flarestamina.com/speaking-topics/', '2026-07-17', 'monthly', '0.8'),
              ('https://flarestamina.com/teachers/', today, 'monthly', '0.8'),
              ('https://flarestamina.com/privacy/', today, 'yearly', '0.3'),
              ('https://flarestamina.com/wedding/', '2026-07-16', 'monthly', '0.7'),
          ]
          seen = {u[0] for u in urls}
          for p in posts:
              u = f"https://flarestamina.com/news/{p['slug']}/"
              if u in seen:
                  continue
              seen.add(u)
              urls.append((u, p['date'], 'monthly', '0.8'))

          # one indexable page per community article + per author
          for meta in arts.values():
              u = f"https://flarestamina.com/news/a/{meta['slug']}/"
              if u in seen:
                  continue
              seen.add(u)
              urls.append((u, meta.get('date') or news_mod, 'monthly', '0.7'))
          for a in authors:
              u = f"https://flarestamina.com/news/t/{a}/"
              if u in seen:
                  continue
              seen.add(u)
              urls.append((u, news_mod, 'weekly', '0.6'))
          for t in tests:
              u = (t.get('url') or '').strip()
              if not u or u in seen:
                  continue
              if not u.startswith('https://flarestamina.com'):
                  continue  # skip external tools (e.g. pierics.com) — not our sitemap
              seen.add(u)
              urls.append((u, t.get('date') or today, 'monthly', '0.7'))

          out = ['<?xml version="1.0" encoding="UTF-8"?>',
                 '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">']
          for loc, mod, freq, pri in urls:
              out.append(f'  <url><loc>{loc}</loc><lastmod>{mod}</lastmod>'
                         f'<changefreq>{freq}</changefreq><priority>{pri}</priority></url>')
          out.append('</urlset>')
          open('sitemap.xml', 'w').write('\n'.join(out) + '\n')
          print('URLs:', len(urls))
          EOF

      - name: Commit if changed
        run: |
          # ignore lastmod-only churn on the two dynamic rows: compare URL sets too
          if git diff --quiet sitemap.xml; then
            echo "sitemap unchanged"
          else
            git config user.name "Flarestamina-bot"
            git config user.email "actions@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "Auto-update sitemap"
            git push
          fi
