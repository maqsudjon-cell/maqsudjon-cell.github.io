name: Build community pages

# Turns Firestore articles into static, indexable pages (news/a/<slug>/),
# author pages (news/t/<author>/) and per-article OG images (news/og/).
# Runs often so a teacher's article gets its own URL within a couple of hours.
on:
  schedule:
    - cron: '15 */3 * * *'   # every 3 hours
  workflow_dispatch:          # "Run workflow" button for an instant rebuild

permissions:
  contents: write

concurrency:
  group: community-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Pillow (OG image rendering)
        run: pip install --quiet pillow

      - name: Generate article + author pages and OG images
        id: build
        run: python3 .github/scripts/build_community.py

      - name: Tell me on Telegram when someone publishes
        # Needs repo secrets TELEGRAM_BOT_TOKEN (from @BotFather) and
        # TELEGRAM_CHAT_ID (your own chat, or the channel id). Skipped until set.
        if: steps.build.outputs.new_count != '0' && steps.build.outputs.new_count != ''
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEW_LIST: ${{ steps.build.outputs.new_list }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT" ]; then
            echo "Telegram secrets not set — skipping notification"; exit 0
          fi
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            TITLE="${line%%—*}"; REST="${line#*—}"
            AUTHOR="${REST%%—*}"; URL="${REST#*—}"
            TEXT=$(printf '📝 Yangi maqola chiqdi\n\n%s\n✍️ %s\n%s\n\nModeratsiya: https://flarestamina.com/admin/' "$TITLE" "$AUTHOR" "$URL")
            curl -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT}" \
              --data-urlencode "text=${TEXT}" \
              --data-urlencode "disable_web_page_preview=false" -o /dev/null
            echo "notified: $TITLE"
          done <<< "$NEW_LIST"

      - name: Commit if changed
        run: |
          if git diff --quiet -- news/a news/t news/og news/articles-index.json; then
            echo "no community changes"
          else
            git config user.name "Flarestamina-bot"
            git config user.email "actions@users.noreply.github.com"
            git add news/a news/t news/og news/articles-index.json
            git commit -m "Auto-build community pages"
            git pull --rebase --autostash origin main || true
            git push
          fi
