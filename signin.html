<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">
<meta name="theme-color" content="#060A09">
<script>(function(){var t='dark';try{t=localStorage.getItem('p8-theme')||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');}catch(e){}document.documentElement.setAttribute('data-theme',t);})();</script>
<title>Sign in — Flarestamina</title>
<meta name="description" content="Sign in to Flarestamina to sync your IELTS practice results across devices.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="favicon.ico" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://www.gstatic.com">
<style>
:root{
  --bg:#060A09;
  --bg-2:#0A100E;
  --surface:rgba(255,255,255,.035);
  --surface-2:rgba(255,255,255,.06);
  --line:rgba(255,255,255,.09);
  --line-2:rgba(255,255,255,.16);
  --text:#EAF2EE;
  --muted:#8FA89E;
  --em:#10B981;
  --em-bright:#34D399;
  --mint:rgba(52,211,153,.12);
  --grad:linear-gradient(120deg,#34D399 0%,#2DD4BF 50%,#22D3EE 100%);
  --display:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --r:18px;
  --err:#F87171;
  --ok:#34D399;
}
html[data-theme="light"]{
  --bg:#F6F8F7;
  --bg-2:#FFFFFF;
  --surface:rgba(15,42,33,.04);
  --surface-2:rgba(15,42,33,.07);
  --line:rgba(15,42,33,.12);
  --line-2:rgba(15,42,33,.24);
  --text:#13231C;
  --muted:#5B6F66;
  --em:#0D9268;
  --em-bright:#0A8A60;
  --mint:rgba(13,146,104,.10);
  --grad:linear-gradient(120deg,#0EA371 0%,#0D9488 50%,#0891B2 100%);
  --err:#DC2626;
  --ok:#0A8A60;
  color-scheme:light;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--body);background:var(--bg);color:var(--text);
  min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 18px;-webkit-font-smoothing:antialiased;
}
.back{
  position:fixed;top:18px;left:18px;color:var(--muted);text-decoration:none;font-size:.88rem;
  display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;
}
.back:hover{color:var(--text);background:var(--surface)}
.wordmark{
  font-family:var(--display);font-weight:700;font-size:1.9rem;letter-spacing:-.02em;
  color:var(--text);text-decoration:none;margin-bottom:6px;
}
.wordmark b{color:var(--em-bright);font-weight:700}
.tagline{color:var(--muted);font-size:.92rem;margin-bottom:26px;text-align:center}
.card{
  width:100%;max-width:420px;background:var(--bg-2);border:1px solid var(--line);
  border-radius:var(--r);padding:28px 26px;box-shadow:0 20px 60px -30px rgba(0,0,0,.55);
}
.card h1{font-family:var(--display);font-size:1.25rem;font-weight:600;margin-bottom:20px}
label{display:block;font-size:.85rem;font-weight:500;color:var(--muted);margin:0 0 6px 2px}
.field{margin-bottom:14px}
.inwrap{position:relative}
input[type=email],input[type=password],input[type=text]{
  width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--line-2);
  background:var(--surface);color:var(--text);font:inherit;font-size:.95rem;outline:none;
  transition:border-color .15s, box-shadow .15s;
}
input:focus{border-color:var(--em);box-shadow:0 0 0 3px var(--mint)}
.eye{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:none;border:0;color:var(--muted);cursor:pointer;padding:6px;font-size:.95rem;line-height:1;
}
.eye:hover{color:var(--text)}
.rowlink{display:flex;justify-content:flex-end;margin:-4px 0 14px}
.rowlink a{color:var(--em-bright);font-size:.85rem;text-decoration:none}
.rowlink a:hover{text-decoration:underline}
.btn{
  width:100%;display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:13px 20px;border-radius:12px;border:1px solid transparent;cursor:pointer;
  font-family:var(--display);font-weight:600;font-size:.98rem;text-decoration:none;
  transition:transform .12s, filter .15s, background .15s, border-color .15s;
}
.btn:active{transform:scale(.985)}
.btn[disabled]{opacity:.55;cursor:default;pointer-events:none}
.btn-primary{background:var(--em);color:#04110C}
html[data-theme="light"] .btn-primary{color:#fff}
.btn-primary:hover{filter:brightness(1.08)}
.btn-plain{background:var(--surface);border-color:var(--line-2);color:var(--text)}
.btn-plain:hover{background:var(--surface-2)}
.gicon{width:18px;height:18px;flex:none}
.or{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:.82rem;margin:16px 0}
.or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}
.msg{display:none;margin:0 0 14px;padding:10px 13px;border-radius:10px;font-size:.88rem;line-height:1.45}
.msg.show{display:block}
.msg.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35);color:var(--err)}
.msg.ok{background:var(--mint);border:1px solid rgba(52,211,153,.35);color:var(--ok)}
.swap{margin-top:18px;text-align:center;font-size:.9rem;color:var(--muted)}
.swap a{color:var(--em-bright);font-weight:600;text-decoration:none}
.swap a:hover{text-decoration:underline}
.foot{margin-top:26px;color:var(--muted);font-size:.8rem;text-align:center}
.foot a{color:var(--muted)}
/* signed-in view */
.me{display:none;text-align:center}
.me.show{display:block}
.me .avatar{width:56px;height:56px;border-radius:50%;object-fit:cover;margin-bottom:12px}
.me .avatar-fb{
  width:56px;height:56px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  background:var(--grad);color:#04110C;font-family:var(--display);font-weight:700;font-size:1.3rem;margin-bottom:12px;
}
.me p{color:var(--muted);font-size:.92rem;margin-bottom:20px;word-break:break-all}
.me p b{color:var(--text)}
.me .btn + .btn{margin-top:10px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,0,0,.25);border-top-color:currentColor;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-3px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<a class="back" href="./">← flarestamina.com</a>

<a class="wordmark" href="./"><b>FLARE</b>STAMINA</a>
<div class="tagline">Sign in to sync your IELTS results across devices</div>

<div class="card">
  <div id="formView">
    <h1 id="formTitle">Sign in</h1>
    <div class="msg" id="msg" role="alert"></div>
    <form id="authForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="john@example.com" required>
      </div>
      <div class="field">
        <label for="pass">Password</label>
        <div class="inwrap">
          <input type="password" id="pass" autocomplete="current-password" placeholder="••••••••" minlength="6" required>
          <button type="button" class="eye" id="eyeBtn" aria-label="Show password">👁</button>
        </div>
      </div>
      <div class="rowlink" id="forgotRow"><a href="#" id="forgotLink">Forgot password?</a></div>
      <button class="btn btn-primary" id="submitBtn" type="submit">Sign in</button>
    </form>
    <div class="or">or</div>
    <button class="btn btn-plain" id="googleBtn" type="button">
      <svg class="gicon" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <div class="swap" id="swapRow">Are you new? <a href="#" id="swapLink">Create an Account</a></div>
  </div>

  <div class="me" id="meView">
    <div id="meAvatar"></div>
    <p>You're signed in as <b id="meName"></b></p>
    <a class="btn btn-primary" id="continueBtn" href="/ielts-hub/">Continue to practice</a>
    <button class="btn btn-plain" id="signOutBtn" type="button">Sign out</button>
  </div>
</div>

<div class="foot">Your results stay private — signing in only syncs your own scores.</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js" defer></script>
<script>
(function(){
  'use strict';
  var auth = null;
  var mode = 'signin';               /* 'signin' | 'signup' */
  var actionStarted = false;         /* redirect only after an explicit action */

  /* Only same-site relative paths — never an absolute/protocol-relative URL. */
  var next = '/ielts-hub/';
  try{
    var q = new URLSearchParams(location.search).get('next');
    if(q && q.charAt(0) === '/' && q.charAt(1) !== '/') next = q;
  }catch(e){}

  var $ = function(id){ return document.getElementById(id); };
  var msg = $('msg'), form = $('authForm'), emailEl = $('email'), passEl = $('pass');
  var submitBtn = $('submitBtn'), googleBtn = $('googleBtn');

  function say(text, kind){
    msg.textContent = text;
    msg.className = 'msg show ' + (kind || 'err');
  }
  function clearMsg(){ msg.className = 'msg'; msg.textContent = ''; }
  function busy(on){
    submitBtn.disabled = on; googleBtn.disabled = on;
    submitBtn.innerHTML = on ? '<span class="spin"></span>' : (mode === 'signin' ? 'Sign in' : 'Create account');
  }

  function friendly(err){
    var c = (err && err.code) || '';
    switch(c){
      case 'auth/invalid-email': return 'That email address doesn’t look right.';
      case 'auth/user-not-found':
      case 'auth/wrong-password':
      case 'auth/invalid-credential':
      case 'auth/invalid-login-credentials': return 'Email or password is incorrect.';
      case 'auth/email-already-in-use': return 'This email is already registered — sign in instead.';
      case 'auth/weak-password': return 'Password must be at least 6 characters.';
      case 'auth/too-many-requests': return 'Too many attempts — wait a minute and try again.';
      case 'auth/network-request-failed': return 'Network error — check your connection and try again.';
      case 'auth/operation-not-allowed': return 'Email sign-in isn’t enabled yet — use Google below.';
      case 'auth/popup-blocked': return 'Your browser blocked the sign-in window — allow pop-ups and try again.';
      case 'auth/unauthorized-domain': return 'Sign-in error: this domain isn’t authorized in Firebase.';
      case 'auth/operation-not-supported-in-this-environment':
        return 'Google sign-in doesn’t work in this browser — open flarestamina.com in Chrome or Safari, or use email.';
      default: return 'Sign-in failed' + (c ? ' (' + c.replace('auth/','') + ')' : '') + '. Try again.';
    }
  }

  function setMode(m){
    mode = m;
    clearMsg();
    $('formTitle').textContent = m === 'signin' ? 'Sign in' : 'Create an account';
    submitBtn.textContent = m === 'signin' ? 'Sign in' : 'Create account';
    passEl.setAttribute('autocomplete', m === 'signin' ? 'current-password' : 'new-password');
    $('forgotRow').style.display = m === 'signin' ? 'flex' : 'none';
    $('swapRow').innerHTML = m === 'signin'
      ? 'Are you new? <a href="#" id="swapLink">Create an Account</a>'
      : 'Already have an account? <a href="#" id="swapLink">Sign in</a>';
    $('swapLink').addEventListener('click', function(e){
      e.preventDefault();
      setMode(mode === 'signin' ? 'signup' : 'signin');
    });
  }

  function esc(s){ return String(s == null ? '' : s).replace(/[<>&"']/g, ''); }

  function showMe(user){
    $('formView').style.display = 'none';
    var av = $('meAvatar');
    var name = user.displayName || user.email || 'Account';
    av.innerHTML = user.photoURL
      ? '<img class="avatar" src="' + esc(user.photoURL) + '" alt="" referrerpolicy="no-referrer">'
      : '<span class="avatar-fb">' + esc(name.charAt(0).toUpperCase()) + '</span>';
    $('meName').textContent = user.email || name;
    $('continueBtn').href = next;
    $('meView').className = 'me show';
  }
  function showForm(){
    $('meView').className = 'me';
    $('formView').style.display = 'block';
  }

  $('eyeBtn').addEventListener('click', function(){
    var show = passEl.type === 'password';
    passEl.type = show ? 'text' : 'password';
    this.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
  });

  $('swapLink').addEventListener('click', function(e){
    e.preventDefault();
    setMode('signup');
  });

  $('forgotLink').addEventListener('click', function(e){
    e.preventDefault();
    if(!auth) return;
    var email = emailEl.value.trim();
    if(!email){ say('Type your email above first, then tap “Forgot password?”'); emailEl.focus(); return; }
    auth.sendPasswordResetEmail(email).then(function(){
      say('Password reset link sent to ' + email + ' — check your inbox.', 'ok');
    }).catch(function(err){ say(friendly(err)); });
  });

  form.addEventListener('submit', function(e){
    e.preventDefault();
    if(!auth){ say('Sign-in is unavailable right now — reload the page.'); return; }
    var email = emailEl.value.trim(), pass = passEl.value;
    if(!email){ say('Type your email address.'); emailEl.focus(); return; }
    if(!pass || pass.length < 6){ say('Password must be at least 6 characters.'); passEl.focus(); return; }
    clearMsg(); busy(true); actionStarted = true;
    var p = mode === 'signin'
      ? auth.signInWithEmailAndPassword(email, pass)
      : auth.createUserWithEmailAndPassword(email, pass);
    p.then(function(){
      window.location.href = next;
    }).catch(function(err){
      actionStarted = false; busy(false); say(friendly(err));
    });
  });

  googleBtn.addEventListener('click', function(){
    if(!auth){ say('Sign-in is unavailable right now — reload the page.'); return; }
    clearMsg(); actionStarted = true;
    /* Popup only — signInWithRedirect can't complete from flarestamina.com because
       authDomain lives on firebaseapp.com (third-party storage partitioning). */
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(function(){
      window.location.href = next;
    }).catch(function(err){
      actionStarted = false;
      var c = (err && err.code) || '';
      if(c !== 'auth/popup-closed-by-user' && c !== 'auth/cancelled-popup-request') say(friendly(err));
    });
  });

  $('signOutBtn').addEventListener('click', function(){
    if(auth) auth.signOut().then(showForm);
  });

  document.addEventListener('DOMContentLoaded', function(){
    try{
      firebase.initializeApp({
        apiKey: "AIzaSyAqS59ek0seZ0rcSZb3RPhiwTzleIAZ-9E",
        authDomain: "ieltshub-e2aa8.firebaseapp.com",
        projectId: "ieltshub-e2aa8",
        storageBucket: "ieltshub-e2aa8.firebasestorage.app",
        messagingSenderId: "645780307385",
        appId: "1:645780307385:web:1dc8640e294be2204b4a68",
        measurementId: "G-N0DBRBZ1EQ"
      });
      auth = firebase.auth();
      auth.onAuthStateChanged(function(user){
        if(user && !actionStarted) showMe(user);
        if(!user) showForm();
      });
    }catch(err){
      auth = null;
      say('Sign-in is unavailable right now — reload the page.');
    }
  });
})();
</script>
</body>
</html>
